<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="color-scheme" content="dark light" />
  <link rel="stylesheet" href="popup.css" />
  <title>StreamSeeker</title>
</head>
<body>
  <header>
    <h1>StreamSeeker</h1>
    <div id="ss-version" class="version"></div>
  </header>

  <div id="ss-banner" class="banner" hidden></div>

  <nav class="tabs" role="tablist">
    <button class="tab" role="tab" data-tab="updates" aria-selected="false" hidden>
      <span class="tab__label" data-i18n="header.tab.updates">Neu</span>
      <span class="tab__badge" id="ss-updates-badge"></span>
    </button>
    <button class="tab" role="tab" data-tab="status" aria-selected="true" data-i18n="header.tab.status">Status</button>
    <button class="tab" role="tab" data-tab="library" data-i18n="header.tab.library">Sammlung</button>
    <button class="tab" role="tab" data-tab="settings" aria-selected="false" title="Einstellungen" data-i18n-title="header.tab.settings">⚙</button>
  </nav>

  <section id="tab-updates" class="tab-panel" role="tabpanel" aria-labelledby="updates" hidden>
    <div class="updates__toolbar" id="ss-updates-toolbar" hidden>
      <button type="button" id="ss-updates-dismiss-all" class="updates__dismiss-all"
              data-i18n="updates.dismiss_all">Alle als gelesen markieren</button>
    </div>
    <div class="cards" id="ss-updates"></div>
  </section>

  <section id="tab-status" class="tab-panel" role="tabpanel" aria-labelledby="status">
    <div class="summary" id="ss-summary"></div>
    <div class="queue" id="ss-queue"></div>
  </section>

  <section id="tab-library" class="tab-panel" role="tabpanel" aria-labelledby="library" hidden>
    <div class="library__searchbar">
      <input type="search" id="ss-library-search" placeholder="Suche…" data-i18n-placeholder="search.placeholder" />
      <button type="button" id="ss-library-filter-btn" class="library__filter-btn"
              aria-haspopup="true" aria-expanded="false"
              data-i18n-title="filter.button" title="Filter">
        <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
          <path d="M3 5h18l-7 9v6l-4-2v-4z" fill="currentColor"/>
        </svg>
        <span class="library__filter-dot" hidden></span>
      </button>
    </div>
    <div class="library__filter-popover" id="ss-library-filter-popover" hidden role="dialog"></div>
    <div class="cards" id="ss-library"></div>
  </section>

  <section id="tab-settings" class="tab-panel" role="tabpanel" aria-labelledby="settings" hidden>
    <div id="ss-settings"></div>
  </section>

  <div id="ss-detail" class="detail" hidden aria-hidden="true" role="dialog">
    <div class="detail__backdrop" id="ss-detail-backdrop"></div>
    <button type="button" class="detail__close" id="ss-detail-close" title="Schließen">×</button>
    <div class="detail__content">
      <div class="detail__header">
        <div class="detail__poster" id="ss-detail-poster"></div>
        <div class="detail__title-block">
          <h2 class="detail__title" id="ss-detail-title"></h2>
          <div class="detail__meta-row" id="ss-detail-meta"></div>
          <div class="detail__genres" id="ss-detail-genres"></div>
        </div>
      </div>
      <p class="detail__overview" id="ss-detail-overview"></p>
      <div class="detail__stats" id="ss-detail-stats"></div>
      <div class="detail__actions" id="ss-detail-actions"></div>
    </div>
  </div>

  <script src="../locales/de.js"></script>
  <script src="../locales/en.js"></script>
  <script src="../lib/i18n.js"></script>
  <script src="../lib/api.js"></script>
  <script src="popup.js"></script>
</body>
</html>
